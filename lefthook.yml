pre-commit:
  parallel: true
  commands:
    svelte-check:
      glob: "{apps,packages}/**/*.{js,ts,svelte,css}"
      run: bun run check
    check-deps:
      run: bun run check:deps
    check-package-metadata:
      run: bun run check:package-metadata

pre-push:
  parallel: false
  commands:
    check-publint:
      run: bun run check:publint
    qti-public-certification:
      run: |
        if [ "$SKIP_QTI_PUBLIC_CERTIFICATION" = "1" ]; then
          echo "Skipping public QTI certification gate because SKIP_QTI_PUBLIC_CERTIFICATION=1"
        else
          bun run test:certification:public -- --skip-e2e
        fi
